<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bijak Kata Nama Am - Tahun 1</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#60a5fa">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bijak Kata">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: #f0f9ff;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .font-kids { font-family: 'Fredoka One', cursive; }
        .card-bounce:active { transform: scale(0.95); transition: 0.1s; }
        .hidden-section { display: none; }
        .gradient-bg { background: linear-gradient(135deg, #60a5fa, #a855f7); }
        
        .download-icon:hover {
            color: #3b82f6;
            transform: translateY(-2px);
            transition: all 0.2s;
        }

        /* Offline Banner */
        #offline-indicator {
            display: none;
            background: #ef4444;
            color: white;
            text-align: center;
            padding: 4px;
            font-size: 10px;
            font-weight: bold;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 100;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="offline-indicator">MOD OFFLINE AKTIF</div>

    <!-- Splash Screen / Menu Utama -->
    <div id="menu-section" class="w-full max-w-md text-center mt-6">
        <div class="bg-white rounded-3xl shadow-xl p-8 border-4 border-blue-400">
            <h1 class="font-kids text-4xl text-blue-600 mb-2">BIJAK KATA NAMA AM</h1>
            <p class="text-gray-600 mb-6 font-bold">Tahun 1 (KSSR)</p>
            
            <div class="space-y-4">
                <button onclick="startLevel('rendah')" class="w-full bg-green-400 hover:bg-green-500 text-white font-kids py-4 px-6 rounded-2xl shadow-lg border-b-4 border-green-700 transition card-bounce">
                    ARAS RENDAH (TP1-TP2)
                </button>
                <button onclick="startLevel('sederhana')" class="w-full bg-yellow-400 hover:bg-yellow-500 text-white font-kids py-4 px-6 rounded-2xl shadow-lg border-b-4 border-yellow-700 transition card-bounce">
                    ARAS SEDERHANA (TP3-TP4)
                </button>
                <button onclick="startLevel('tinggi')" class="w-full bg-red-400 hover:bg-red-500 text-white font-kids py-4 px-6 rounded-2xl shadow-lg border-b-4 border-red-700 transition card-bounce">
                    ARAS TINGGI (TP5-TP6)
                </button>
            </div>
            
            <!-- Bahagian Peranti -->
            <div class="mt-8 pt-6 border-t border-gray-100">
                <p class="text-xs text-gray-400 uppercase tracking-widest font-bold mb-4">Sesuai Untuk Semua Peranti</p>
                <div class="flex justify-around items-center text-gray-400 px-4">
                    <div class="flex flex-col items-center download-icon">
                        <i data-lucide="monitor" class="w-6 h-6"></i>
                        <span class="text-[10px] mt-1 font-bold">Laptop</span>
                    </div>
                    <div class="flex flex-col items-center download-icon">
                        <i data-lucide="smartphone" class="w-6 h-6"></i>
                        <span class="text-[10px] mt-1 font-bold">Phone</span>
                    </div>
                    <div class="flex flex-col items-center download-icon">
                        <i data-lucide="tablet" class="w-6 h-6"></i>
                        <span class="text-[10px] mt-1 font-bold">iPad/Tab</span>
                    </div>
                    <div class="flex flex-col items-center download-icon">
                        <i data-lucide="wifi-off" class="w-6 h-6"></i>
                        <span class="text-[10px] mt-1 font-bold">Offline</span>
                    </div>
                </div>
                <p class="mt-4 text-[11px] text-blue-500 font-bold cursor-pointer bg-blue-50 py-2 rounded-lg" onclick="installPrompt()">
                    TEKAN SINI UNTUK ARAHAN PEMASANGAN
                </p>
            </div>
        </div>
    </div>

    <!-- Game Section -->
    <div id="game-section" class="w-full max-w-md hidden-section mt-4">
        <div class="bg-white rounded-3xl shadow-xl p-6 border-4 border-blue-400">
            <div class="flex justify-between items-center mb-4">
                <button onclick="showMenu()" class="text-gray-500 font-bold flex items-center">
                    <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> Menu
                </button>
                <div class="bg-blue-100 px-4 py-1 rounded-full text-blue-700 font-bold text-sm" id="level-indicator">Aras</div>
            </div>

            <div class="mb-6 h-3 bg-gray-200 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
            </div>

            <div id="question-container" class="text-center"></div>
        </div>
    </div>

    <!-- Result Section -->
    <div id="result-section" class="w-full max-w-md hidden-section mt-10">
        <div class="bg-white rounded-3xl shadow-xl p-8 border-4 border-purple-400 text-center">
            <h2 class="font-kids text-3xl text-purple-600 mb-4">Tahniah!</h2>
            <div id="tp-badge" class="inline-block px-8 py-4 rounded-3xl text-white font-kids text-2xl mb-4 gradient-bg">TP 1</div>
            <p id="result-text" class="text-gray-700 mb-6 text-lg font-bold"></p>
            <div id="tp-desc" class="bg-purple-50 p-4 rounded-xl text-purple-900 text-sm mb-6 italic"></div>
            
            <button onclick="showMenu()" class="bg-blue-500 text-white font-kids py-3 px-10 rounded-2xl shadow-lg border-b-4 border-blue-700 active:translate-y-1 transition">
                MAIN LAGI
            </button>
        </div>
    </div>

    <!-- Toast UI -->
    <div id="feedback-toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 px-8 py-3 rounded-full text-white font-bold hidden-section transition-opacity duration-300 z-50 shadow-2xl"></div>

    <script>
        lucide.createIcons();

        // Game Logic
        const levels = {
            rendah: {
                title: "Aras Rendah",
                questions: [
                    { q: "Mana satu Kata Nama Am bagi 'Haiwan'?", options: ["Kucing", "Meow", "Lari"], correct: 0 },
                    { q: "Pilih objek yang merupakan Kata Nama Am:", options: ["Besar", "Meja", "Cantik"], correct: 1 },
                    { q: "Emak pergi ke ____.", options: ["Makan", "Tidur", "Pasar"], correct: 2 },
                    { q: "Ayah pakai ____ ke pejabat.", options: ["Kemeja", "Merah", "Suka"], correct: 0 },
                    { q: "Pilih Kata Nama Am bagi 'Orang':", options: ["Guru", "Ahmad", "Pandai"], correct: 0 }
                ]
            },
            sederhana: {
                title: "Aras Sederhana",
                questions: [
                    { q: "Kelaskan: 'Sekolah' adalah kategori...", options: ["Benda", "Tempat", "Haiwan"], correct: 1 },
                    { q: "Antara berikut, yang mana bukan Kata Nama Am?", options: ["Buku", "Si Comel", "Pensel"], correct: 1 },
                    { q: "Ibu membeli sayur di ____.", options: ["Padang", "Pasar", "Sekolah"], correct: 1 },
                    { q: "____ itu sedang menyalak.", options: ["Kucing", "Anjing", "Ayam"], correct: 1 },
                    { q: "____ mengajar kami di dalam kelas.", options: ["Doktor", "Polis", "Guru"], correct: 2 }
                ]
            },
            tinggi: {
                title: "Aras Tinggi",
                questions: [
                    { q: "Saya membaca ____ di perpustakaan.", options: ["Buku", "Meja", "Lantai"], correct: 0 },
                    { q: "Pilih ayat yang betul:", options: ["Adik makan Ahmad.", "Adik makan pisang.", "Adik makan merah."], correct: 1 },
                    { q: "Ali dan Abu bermain bola di ____.", options: ["Langit", "Padang", "Air"], correct: 1 },
                    { q: "Abang menunggang ____ untuk ke pekan.", options: ["Basikal", "Kasut", "Baju"], correct: 0 },
                    { q: "Alat untuk menulis ialah ____.", options: ["Buku", "Pemadam", "Pensel"], correct: 2 }
                ]
            }
        };

        let currentLevel = null;
        let currentQuestionIdx = 0;
        let score = 0;

        function showMenu() {
            document.getElementById('menu-section').classList.remove('hidden-section');
            document.getElementById('game-section').classList.add('hidden-section');
            document.getElementById('result-section').classList.add('hidden-section');
        }

        function startLevel(lvl) {
            currentLevel = levels[lvl];
            currentQuestionIdx = 0;
            score = 0;
            document.getElementById('level-indicator').innerText = currentLevel.title;
            document.getElementById('menu-section').classList.add('hidden-section');
            document.getElementById('game-section').classList.remove('hidden-section');
            showQuestion();
        }

        function showQuestion() {
            const question = currentLevel.questions[currentQuestionIdx];
            const progress = (currentQuestionIdx / currentLevel.questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            let html = `<h3 class="text-xl font-bold text-gray-800 mb-6">${question.q}</h3><div class="grid grid-cols-1 gap-4">`;
            question.options.forEach((opt, idx) => {
                html += `<button onclick="checkAnswer(${idx})" class="w-full py-4 px-6 bg-blue-50 border-2 border-blue-200 rounded-2xl hover:bg-blue-100 hover:border-blue-400 font-bold text-blue-800 transition active:scale-95">${opt}</button>`;
            });
            html += `</div>`;
            document.getElementById('question-container').innerHTML = html;
        }

        function checkAnswer(idx) {
            const correct = currentLevel.questions[currentQuestionIdx].correct;
            if (idx === correct) {
                score++;
                showFeedback("Betul! Hebat! 🌟", "bg-green-500");
            } else {
                showFeedback("Ups! Cuba lagi. 💪", "bg-red-500");
            }

            setTimeout(() => {
                currentQuestionIdx++;
                if (currentQuestionIdx < currentLevel.questions.length) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 800);
        }

        function showFeedback(msg, color) {
            const toast = document.getElementById('feedback-toast');
            toast.innerText = msg;
            toast.className = `fixed bottom-10 left-1/2 transform -translate-x-1/2 px-8 py-3 rounded-full text-white font-bold shadow-lg z-50 ${color}`;
            toast.classList.remove('hidden-section');
            setTimeout(() => toast.classList.add('hidden-section'), 800);
        }

        function showResult() {
            document.getElementById('game-section').classList.add('hidden-section');
            document.getElementById('result-section').classList.remove('hidden-section');
            const total = currentLevel.questions.length;
            const pct = (score / total);
            let tp, desc;

            if (currentLevel.title.includes("Rendah")) {
                tp = pct > 0.6 ? 2 : 1;
                desc = tp === 2 ? "Murid boleh mengenal pasti kata nama am dengan bimbingan." : "Murid mula mengenal kata nama am.";
            } else if (currentLevel.title.includes("Sederhana")) {
                tp = pct > 0.8 ? 4 : 3;
                desc = tp === 4 ? "Murid boleh mengelaskan kata nama am mengikut kategori dengan betul." : "Murid memahami penggunaan kata nama am dalam konteks terhad.";
            } else {
                tp = pct > 0.8 ? 6 : 5;
                desc = tp === 6 ? "Murid cemerlang, boleh membina ayat kreatif dan menjadi contoh." : "Murid boleh membina ayat yang betul dan bermakna.";
            }

            document.getElementById('tp-badge').innerText = `TP ${tp}`;
            document.getElementById('tp-desc').innerText = `Deskripsi: ${desc}`;
            document.getElementById('result-text').innerText = `Skor: ${score} / ${total}`;
        }

        function installPrompt() {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            const msg = isIOS ? "Safari: Tekan butang 'Share' -> 'Add to Home Screen' 📱" : "Android: Tekan tiga titik (menu) -> 'Install App' atau 'Add to Home Screen' 📱";
            showFeedback(msg, "bg-blue-600");
        }

        // Detect Offline Status
        window.addEventListener('offline', () => document.getElementById('offline-indicator').style.display = 'block');
        window.addEventListener('online', () => document.getElementById('offline-indicator').style.display = 'none');
        
        // Peringatan PWA: Untuk GitHub Pages atau Server Sebenar, 
        // Service Worker memerlukan fail fizikal 'sw.js' untuk kestabilan offline 100%.
        // Buat masa ini, aplikasi akan berjalan stabil di semua peranti.
    </script>
</body>
</html>
