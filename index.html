<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Kata Nama Am</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(#a8e6cf, #dcedc1);
  padding: 20px;
}
.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
}
button {
  padding: 15px;
  margin: 10px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
}
.correct { background: green; color: white; }
.wrong { background: red; color: white; }
</style>

</head>
<body>

<h1>🎮 Game Kata Nama Am</h1>

<div class="card">
  <p>Pilih kata nama am:</p>

  <button onclick="check(this, true)">kerusi</button>
  <button onclick="check(this, false)">Ali</button>

  <h3 id="score">Markah: 0</h3>
</div>

<!-- AUDIO -->
<audio id="betul">
<source src="data:audio/mp3;base64,//uQZAAAAAAAAAAAAAAAAAAAA" type="audio/mp3">
</audio>

<audio id="salah">
<source src="data:audio/mp3;base64,//uQZAAAAAAAAAAAAAAAAAAAA" type="audio/mp3">
</audio>

<script>
let score = 0;

function check(btn, betul){
  if(betul){
    btn.classList.add("correct");
    score++;
    document.getElementById("betul").play();
  } else {
    btn.classList.add("wrong");
    document.getElementById("salah").play();
  }
  document.getElementById("score").innerText = "Markah: " + score;
}

// REGISTER SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
