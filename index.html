<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Kata Nama Am</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
</head>
<body>
    <div class="game-container">
        <h1>🔍 Cari Kata Nama Am</h1>
        <p>Klik pada perkataan yang betul!</p>
        
        <div id="sentence-container" class="sentence"></div>
        
        <div class="stats">
            <div>Skor: <b id="score">0</b></div>
            <div>Terbaik: <b id="high-score">0</b></div>
            <div>Nyawa: <b id="lives">3</b></div>
        </div>
        
        <button id="next-btn" onclick="nextLevel()" style="display:none;">Soalan Seterusnya ➡️</button>
    </div>

    <script src="game.js"></script>
    <script>
        // Mendaftarkan Service Worker untuk fungsi Offline
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => console.log("Service Worker Berjaya Didaftar"));
        }
    </script>
</body>
